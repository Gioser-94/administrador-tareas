<section class="board">
    <div class="board__scroller">
        <div class="board__columns" cdkDropListGroup>
            @for(columna of columnasFiltradas(); track columna.id) {
                <section class="board-column">
                    <header class="board-column__header">
                        <h2 class="board-column__title">{{ columna.titulo }}</h2>
                        <p class="board-column__count">Tareas ({{tareaService.getTareasPorColumna(columna.id)().length}})</p>
                    </header>

                    <div class="board-column__body">
                        <div
                            class="board-column__dropzone"
                            cdkDropList
                            [id]="columna.id"
                            [cdkDropListData]="tareaService.getTareasPorColumna(columna.id)()"
                            (cdkDropListDropped)="drop($event)"
                        >
                            @for(tarea of tareaService.getTareasPorColumna(columna.id)(); track tarea.id){
                                <app-task [tarea]="tarea"></app-task>           
                            }
                        </div>
                    </div>      
                </section>
            }
        </div>
    </div>
</section>
