<div class="contenedor-columnas" cdkDropListGroup>
    @for(columna of columnasFiltradas(); track columna.id){
    <div class="columna">
        <div class="columna-titulo">
            <h3>{{columna.titulo}}</h3>
            <p>Tareas ({{tareaService.getTareasPorColumna(columna.id)().length}})</p>
        </div>
        <div class="contenedor-tareas" cdkDropList [id]="columna.id"
            [cdkDropListData]="tareaService.getTareasPorColumna(columna.id)()" (cdkDropListDropped)="drop($event)">
            @for(tarea of tareaService.getTareasPorColumna(columna.id)(); track tarea.id){
                <app-task [tarea]="tarea"></app-task>
            }
        </div>
    </div>
    }
</div>
